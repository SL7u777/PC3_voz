<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Propuesta - Voz del Ciudadano</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Voz del Ciudadano</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="crear.html">Nueva Propuesta</a>
            <a href="congreso.html">Panel del Congreso</a>
        </nav>
    </header>
    <main>
        <div id="detalle"><p>Cargando...</p></div>
    </main>
    <script>
        const API = 'http://localhost:8000';
        const id = new URLSearchParams(window.location.search).get('id');
        if (!id) window.location.href = 'index.html';

        async function cargar() {
            try {
                const [resProp, resAdj, resMod, resCom] = await Promise.all([
                    fetch(`${API}/proposals/${id}`),
                    fetch(`${API}/proposals/${id}/adjuntos`),
                    fetch(`${API}/proposals/${id}/modificaciones`),
                    fetch(`${API}/proposals/${id}/comentarios`)
                ]);
                if (!resProp.ok) {
                    document.getElementById('detalle').innerHTML = '<p class="alerta error">Propuesta no encontrada.</p>';
                    return;
                }
                const p = await resProp.json();
                const adjuntos = resAdj.ok ? await resAdj.json() : [];
                const modificaciones = resMod.ok ? await resMod.json() : [];
                const comentarios = resCom.ok ? await resCom.json() : [];
                renderDetalle(p, adjuntos, modificaciones, comentarios);
            } catch(err) {
                document.getElementById('detalle').innerHTML = '<p class="alerta error">No se pudo conectar con el servidor.</p>';
            }
        }

        function iconoArchivo(tipo) {
            if (tipo.includes('pdf')) return '📄';
            if (tipo.includes('video')) return '🎥';
            if (tipo.includes('audio')) return '🎵';
            if (tipo.includes('image')) return '🖼️';
            return '📎';
        }

        function renderDetalle(p, adjuntos, modificaciones, comentarios) {
            const activa = p.status === 'activa';
            const congelada = p.status === 'congelada';
            const expirada = p.status === 'expirada';

            function renderContenidoArchivo(a, uid) {
                const url = `http://localhost:8000/uploads/${id}/${a.filename}`;
                let contenido = '';
                if (a.file_type.includes('image')) {
                    contenido = `<img src="${url}" alt="${a.filename}" style="max-width:100%;border-radius:6px;margin-top:8px;display:block">`;
                } else if (a.file_type.includes('video')) {
                    contenido = `<video controls style="max-width:100%;margin-top:8px;border-radius:6px"><source src="${url}" type="${a.file_type}"></video>`;
                } else if (a.file_type.includes('audio')) {
                    contenido = `<audio controls style="width:100%;margin-top:8px"><source src="${url}" type="${a.file_type}"></audio>`;
                } else if (a.file_type.includes('pdf')) {
                    contenido = `<a href="${url}" target="_blank" style="color:#4f8ef7;display:inline-block;margin-top:6px">📄 Abrir ${a.filename}</a>`;
                }
                return `<div id="preview-${uid}" style="display:none">${contenido}</div>`;
            }

            const listaAdjuntos = adjuntos.length
                ? adjuntos.map((a, i) => {
                    const uid = `adj-${i}`;
                    return `
                    <div class="item-lista">
                        <div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="(function(){var d=document.getElementById('preview-${uid}');var b=document.getElementById('btn-${uid}');if(d.style.display==='none'){d.style.display='block';b.textContent='Ocultar ▲';}else{d.style.display='none';b.textContent='Ver archivo ▼';}})()">
                            <span>${iconoArchivo(a.file_type)} <strong>${a.filename}</strong> <span style="color:#718096;font-size:0.8rem">${a.file_type}</span></span>
                            <span id="btn-${uid}" style="color:#4f8ef7;font-size:0.8rem;white-space:nowrap;margin-left:12px">Ver archivo ▼</span>
                        </div>
                        ${renderContenidoArchivo(a, uid)}
                    </div>`;
                }).join('')
                : '<p style="color:#718096;font-size:0.9rem">Sin adjuntos aún.</p>';

            const listaMods = modificaciones.length
                ? modificaciones.map(m => `<div class="item-lista"><span style="color:#718096;font-size:0.8rem">Sección: ${m.section}</span><br><span style="color:#e0e0e0">${m.proposed_change}</span></div>`).join('')
                : '<p style="color:#718096;font-size:0.9rem">Sin modificaciones propuestas.</p>';

            document.getElementById('detalle').innerHTML = `
                <div class="seccion">
                    <h2>${p.title} <span class="tag ${p.status}">${p.estado_legible}</span></h2>
                    <p style="margin:12px 0;line-height:1.6">${p.description}</p>
                    <p>Proponente: <strong>${p.creator_name}</strong></p>
                    <p>Creada: ${new Date(p.created_at).toLocaleDateString('es-PE')} &nbsp;|&nbsp; Plazo: ${new Date(p.deadline).toLocaleDateString('es-PE')}</p>
                    <div class="barra" style="margin-top:12px">
                        <div class="progreso" style="width:${Math.min(p.progreso_firmas,100)}%"></div>
                    </div>
                    <p>${p.signature_count} firmas &nbsp;|&nbsp; ${p.progreso_firmas}% &nbsp;|&nbsp; Faltan: ${p.firmas_restantes}</p>
                    ${congelada ? `<p style="margin-top:10px">Hash SHA-256:</p><div class="hash">${p.frozen_hash}</div>` : ''}
                    ${expirada ? `<p style="color:#f6ad55;margin-top:10px">Esta propuesta expiró sin alcanzar las 25,000 firmas en 90 días.</p>` : ''}
                </div>

                ${(adjuntos.length || modificaciones.length) ? `
                <div class="seccion">
                    <h3>Resumen de actividad</h3>
                    <div class="item-lista">✏️ ${modificaciones.length} modificación(es) propuesta(s)</div>
                    <div class="item-lista">📄 ${adjuntos.length} recurso(s) adjunto(s)</div>
                </div>` : ''}

                <div class="seccion">
                    <h3>Recursos Adjuntos</h3>
                    ${listaAdjuntos}
                </div>

                <div class="seccion">
                    <h3>Modificaciones Propuestas</h3>
                    ${listaMods}
                </div>

                ${comentarios.length ? `
                <div class="seccion">
                    <h3>Comentarios</h3>
                    ${comentarios.map(c => `<div class="item-lista"><strong>${c.author}</strong><br><span style="color:#e0e0e0">${c.content}</span><span style="color:#718096;font-size:0.78rem;margin-left:8px">${new Date(c.created_at).toLocaleDateString('es-PE')}</span></div>`).join('')}
                </div>` : ''}

                ${activa ? `
                <div class="seccion">
                    <h3>Participar en esta propuesta</h3>
                    <form id="form-participar">
                        <label>Nombre completo *</label>
                        <input type="text" id="citizen_name" placeholder="Requerido para registrar tu firma" required>
                        <label>DNI *</label>
                        <input type="text" id="citizen_id" maxlength="8" placeholder="Requerido para validar tu firma" required>
                        <label>Comentario u opinión <span style="color:#718096;font-size:0.8rem">(opcional)</span></label>
                        <textarea id="comment_content" rows="2" placeholder="Comparte tu opinión sobre esta propuesta..."></textarea>
                        <label>Sección a modificar <span style="color:#718096;font-size:0.8rem">(opcional)</span></label>
                        <input type="text" id="mod_section" placeholder="Ej: Artículo 2, Considerando 1...">
                        <label>Cambio propuesto <span style="color:#718096;font-size:0.8rem">(opcional · anónimo — tu nombre no será visible)</span></label>
                        <textarea id="mod_change" rows="3" placeholder="Tu propuesta de cambio se publicará de forma anónima..."></textarea>
                        <label>Adjuntar recurso de apoyo <span style="color:#718096;font-size:0.8rem">(opcional — PDF, imagen, video, audio)</span></label>
                        <input type="file" id="archivo" accept=".pdf,.jpg,.jpeg,.png,.mp4,.mp3">
                        <button type="submit" style="margin-top:8px">Enviar participación</button>
                    </form>
                    <div id="msg-participar"></div>
                </div>` : ''}

                ${congelada ? `
                <div class="seccion">
                    <p style="color:#b794f4">Esta propuesta está congelada. No admite más cambios.</p>
                    <a href="congreso.html"><button class="peligro" style="margin-top:12px">Ver en Panel del Congreso</button></a>
                </div>` : ''}
            `;

            if (activa) {
                document.getElementById('form-participar').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const msg = document.getElementById('msg-participar');
                    const nombre = document.getElementById('citizen_name').value;
                    const dni = document.getElementById('citizen_id').value;
                    const seccion = document.getElementById('mod_section').value.trim();
                    const cambio = document.getElementById('mod_change').value.trim();
                    const archivo = document.getElementById('archivo').files[0];
                    const resultados = [];

                    const comentario = document.getElementById('comment_content').value.trim();

                    const resFirma = await fetch(`${API}/proposals/${id}/firmas`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ citizen_name: nombre, citizen_id: dni })
                    });
                    const dataFirma = await resFirma.json();
                    if (!resFirma.ok) { msg.innerHTML = `<div class="alerta error">${dataFirma.detail}</div>`; return; }
                    resultados.push(`Firma registrada (total: ${dataFirma.total_firmas})`);

                    if (comentario) {
                        const resCom = await fetch(`${API}/proposals/${id}/comentarios`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ author_name: nombre, content: comentario })
                        });
                        if (resCom.ok) resultados.push('Comentario registrado');
                    }

                    if (seccion && cambio) {
                        const resMod = await fetch(`${API}/proposals/${id}/modificaciones`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ author_name: nombre, section: seccion, proposed_change: cambio })
                        });
                        if (resMod.ok) resultados.push('Modificación registrada');
                    }

                    if (archivo) {
                        const formData = new FormData();
                        formData.append('archivo', archivo);
                        const resAdj = await fetch(`${API}/proposals/${id}/adjuntos`, { method: 'POST', body: formData });
                        const dataAdj = await resAdj.json();
                        if (resAdj.ok) resultados.push(`Adjunto subido: ${dataAdj.filename}`);
                        else resultados.push(`Adjunto: ${dataAdj.detail}`);
                    }

                    msg.innerHTML = `<div class="alerta exito">${resultados.join(' · ')}</div>`;
                    cargar();
                });
            }
        }

        cargar();
    </script>
</body>
</html>
